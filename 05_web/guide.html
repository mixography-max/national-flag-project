<body>
  <!-- Navigation -->
  <nav class="site-nav" id="site-nav">

      <a href="guide.html" class="nav-link active">📖 国旗ガイド</a>

  <!-- Hero -->

      <div class="stat">
        <div class="stat-number" style="color:var(--success)" id="stat-dejure">—</div>
