   height="474">
  <title>Flag of Micronesia (ミクロネシア連邦)</title>
  <desc>ISO 3166-1: FM | Ratio: 10:19 | De facto (Standard Vexillological Approximations)</desc>
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
