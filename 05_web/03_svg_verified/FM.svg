	<rect x="-19" y="-10" width="38" height="20" fill="#6CACE4"/>
	<g id="star" transform="translate(0,-6)" fill="#fff">
		<g id="c">
			<path id="t" d="M 0,-2 V 0 H 1" transform="rotate(18 0,-2)"/>
			<use xlink:href="#t" transform="scale(-1,1)"/>
		</g>
