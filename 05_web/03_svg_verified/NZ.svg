<?xml version="1.0" encoding="UTF-8"?>
<svg
   xmlns:ns1="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   viewBox="0 0 1200 600"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg"
   width="900"
   height="450">
  <title>Flag of New Zealand (ニュージーランド)</title>
  <desc>ISO 3166-1: NZ | Ratio: 1:2 | De jure (Flags, Emblems, and Names Protection Act 1981 / NZ Government)</desc>
  <metadata>
    <rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
             xmlns:dc="http://purl.org/dc/elements/1.1/">
      <rdf:Description>
        <dc:title>Flag of New Zealand (ニュージーランド)</dc:title>
        <dc:creator>国旗仕様検証プロジェクト (Flag Specification Verification Project)</dc:creator>
        <dc:rights>Colors verified from official government/vexillological sources. SVG geometry from Wikimedia Commons (various authors, mostly public domain).</dc:rights>
        <dc:format>image/svg+xml</dc:format>
        <dc:identifier>NZ</dc:identifier>
      </rdf:Description>
    </rdf:RDF>
  </metadata>
<defs>
	<clipPath id="Canton">
		<path d="M 0,0 L 600,0 L 600,300 L 0,300 z"/>
	</clipPath>
	<clipPath id="Diagonals">
		<path d="M 0,0 L 300,150 L 0,150 z M 300,0 L 600,0 L 300,150 z M 300,150 L 600,150 L 600,300 z M 300,150 L 300,300 L 0,300 z"/>
	</clipPath>
	<g id="Pentagram">
		<g id="Arm" transform="translate(0,-0.324925)">
			<path d="M 0,0 L 0,0.5 L 1,0 z"/>
			<path d="M 0,0 L 0,-0.5 L 1,0 z" transform="rotate(-36,1,0)"/>
		</g>
		<use xlink:href="#Arm" transform="scale(-1,1)"/>
		<use xlink:href="#Arm" transform="rotate(72,0,0)"/>
		<use xlink:href="#Arm" transform="rotate(-72,0,0)"/>
		<use xlink:href="#Arm" transform="rotate(-72,0,0) scale(-1,1)"/>
	</g>
</defs>
<rect fill="#012169" x="0" y="0" width="1200" height="600"/>
<g id="Flag_of_the_United_Kingdom">
	<path id="Saint_Andrews_Cross" stroke="#FFF" d="M 0,0 L 600,300 M 0,300 L 600,0" stroke-width="60" clip-path="url(#Canton)"/>
	<path id="Saint_Patricks_Cross" stroke="#C8102E" d="M 0,0 L 600,300 M 0,300 L 600,0" stroke-width="40" clip-path="url(#Diagonals)"/>
	<g id="Saint_Georges_Cross">
		<path stroke="#FFF" d="M 300,0 L 300,300 M 0,150 L 600,150" stroke-width="100" clip-path="url(#Canton)"/>
		<path stroke="#C8102E" d="M 300,0 L 300,300 M 0,150 L 600,150" stroke-width="60" clip-path="url(#Canton)"/>
	</g>
</g>
<g id="Southern_Cross">
	<g id="Gamma_Crucis">
		<use xlink:href="#Pentagram" fill="#FFF" transform="translate(900,120) scale(45.4)"/>
		<use xlink:href="#Pentagram" fill="#C8102E" transform="translate(900,120) scale(30)"/>
	</g>
	<g transform="rotate(82,900,240)">
		<g id="Delta_Crucis">
			<use xlink:href="#Pentagram" fill="#FFF" transform="translate(900,120) rotate(-82) scale(40.4)"/>
			<use xlink:href="#Pentagram" fill="#C8102E" transform="translate(900,120) rotate(-82) scale(25)"/>
		</g>
		<g id="Beta_Crucis">
			<use xlink:href="#Pentagram" fill="#FFF" transform="translate(900,380) rotate(-82) scale(45.4)"/>
			<use xlink:href="#Pentagram" fill="#C8102E" transform="translate(900,380) rotate(-82) scale(30)"/>
		</g>
	</g>
	<g id="Alpha_Crucis">
		<use xlink:href="#Pentagram" fill="#FFF" transform="translate(900,480) scale(50.4)"/>
		<use xlink:href="#Pentagram" fill="#C8102E" transform="translate(900,480) scale(35)"/>
	</g>
</g>
</svg>